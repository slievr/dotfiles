# Basic mako configuration with 2-second timeout
anchor=top-right
default-timeout=2000
width=420
outer-margin=20
padding=10,15
border-size=2
max-icon-size=32
font=sans-serif 14px

# Colors from current theme
background-color=#0a0a0c
text-color=#b2b5b3
border-color=#131315

# Keep Spotify notifications invisible
[app-name=Spotify]
invisible=1

# Do not disturb mode
[mode=do-not-disturb]
invisible=true

[mode=do-not-disturb app-name=notify-send]
invisible=false

# Critical notifications stay persistent
[urgency=critical]
default-timeout=0
layer=overlay

# Special action buttons for Omarchy notifications
[summary~="Setup Wi-Fi"]
on-button-left=exec sh -c 'omarchy-notification-dismiss "Setup Wi-Fi"; omarchy-launch-wifi'

[summary~="Update System"]
on-button-left=exec sh -c 'omarchy-notification-dismiss "Update System"; omarchy-launch-floating-terminal-with-presentation omarchy-update'

[summary~="Learn Keybindings"]
on-button-left=exec sh -c 'omarchy-notification-dismiss "Learn Keybindings"; omarchy-menu-keybindings'

[summary~="Screenshot copied & saved"]
max-icon-size=80
format=<b>%s</b>\n%b